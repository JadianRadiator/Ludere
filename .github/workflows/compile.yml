name: Build Ludere APK

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Read config_name
        id: config
        shell: bash
        run: |
          CONFIG_NAME=$(grep -oP '(?<=<string name="config_name">).*(?=</string>)' app/src/main/res/values/config.xml)

          if [ -z "$CONFIG_NAME" ]; then
            echo "Failed to find config_name in config.xml"
            exit 1
          fi

          echo "name=$CONFIG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Verify APK exists
        run: |
          if [ ! -f "app/build/outputs/apk/release/app-universal-release.apk" ]; then
            echo "APK not found!"
            exit 1
          fi

      - name: Prepare release information
        id: release
        shell: bash
        run: |
          ORIGINAL_NAME="${{ steps.config.outputs.name }}"

          # Sanitize for Android/Windows filename compatibility:
          # - Replace invalid Windows filename characters: < > : " / \ | ? *
          # - Replace control characters
          # - Trim trailing periods/spaces
          # - Replace remaining unsupported characters with -
          # - Avoid reserved Windows names
          FILE_NAME=$(echo "$ORIGINAL_NAME" \
            | sed 's/[<>:"\/\\|?*]/-/g' \
            | sed 's/[^[:print:]]/-/g' \
            | sed 's/[[:space:]]\+$//' \
            | sed 's/\.+$//' \
            | sed 's/[^A-Za-z0-9._ -]/-/g')

          if [ -z "$FILE_NAME" ]; then
            FILE_NAME="Ludere"
          fi

          case "$(echo "$FILE_NAME" | tr '[:lower:]' '[:upper:]')" in
            CON|PRN|AUX|NUL|COM[1-9]|LPT[1-9])
              FILE_NAME="Ludere-$FILE_NAME"
              ;;
          esac

          TAG_NAME=$(echo "$FILE_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/ /-/g' \
            | sed 's/[^a-z0-9._-]/-/g')

          DATE=$(date +'%Y-%m-%dT%H-%M-%S')

          echo "file_name=$FILE_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG_NAME}-${DATE}" >> "$GITHUB_OUTPUT"
          echo "name=$ORIGINAL_NAME $DATE" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          cp "app/build/outputs/apk/release/app-universal-release.apk" \
             "app/build/outputs/apk/release/${{ steps.release.outputs.file_name }}.apk"

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          files: |
            app/build/outputs/apk/release/${{ steps.release.outputs.file_name }}.apk
