name: Build Ludere APK

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Read config_name
        id: config
        shell: bash
        run: |
          CONFIG_NAME=$(grep -oP '(?<=<string name="config_name">).*(?=</string>)' app/src/main/res/values/config.xml)
          if [ -z "$CONFIG_NAME" ]; then
            echo "Failed to find config_name in config.xml"
            exit 1
          fi

          echo "name=$CONFIG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Verify APK exists
        run: |
          if [ ! -f "app/build/outputs/apk/release/app-universal-release.apk" ]; then
            echo "APK not found!"
            exit 1
          fi

      - name: Prepare release information
        id: release
        shell: bash
        run: |
          TAG_NAME=$(echo "${{ steps.config.outputs.name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')
          DATE=$(date +'%Y-%m-%dT%H-%M-%S')

          echo "tag=${TAG_NAME}-${DATE}" >> "$GITHUB_OUTPUT"
          echo "name=${{ steps.config.outputs.name }} ${DATE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          files: |
            app/build/outputs/apk/release/app-universal-release.apk
