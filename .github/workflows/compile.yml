name: Build Ludere APK

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Read config_name
        id: config
        shell: bash
        run: |
          CONFIG_NAME=$(grep -oP '(?<=<string name="config_name">).*(?=</string>)' app/src/main/res/values/config.xml)

          if [ -z "$CONFIG_NAME" ]; then
            echo "Failed to find config_name in config.xml"
            exit 1
          fi

          echo "name=$CONFIG_NAME" >> "$GITHUB_OUTPUT"

      # =========================================================================
      # FAIL-SAFE API TARGETED SKIN FETCHER AND INJECTOR
      # =========================================================================
      - name: Fetch and Inject Matching Overlay
        shell: bash
        run: |
          # Read raw xml safely into a single string variable to avoid grep null crashes
          XML_CONTENT=$(cat app/src/main/res/values/config.xml)
          
          # Convert contents to uppercase for reliable matching
          XML_UPPER=$(echo "$XML_CONTENT" | tr '[:lower:]' '[:upper:]')
          
          SKIN_PATH="gamepads/flat/classic_retro.cfg"
          API_DIR="gamepads/flat"
          TARGET_SYSTEM="UNKNOWN (Fallback to Flat Gamepad)"
          
          if [[ "$XML_UPPER" == *"MGBA"* || "$XML_UPPER" == *"GBA"* ]]; then
            TARGET_SYSTEM="Game Boy Advance"
            SKIN_PATH="borders/Nintendo-GameBoyAdvance/GameBoyAdvance-Bezel.cfg"
            API_DIR="borders/Nintendo-GameBoyAdvance"
          elif [[ "$XML_UPPER" == *"GAMETTE"* || "$XML_UPPER" == *"GBC"* || "$XML_UPPER" == *"GEARBOY"* || "$XML_UPPER" == *"SAMEBOY"* ]]; then
            TARGET_SYSTEM="Game Boy Color"
            SKIN_PATH="borders/Nintendo-GameBoyColor/GameBoyColor-Bezel.cfg"
            API_DIR="borders/Nintendo-GameBoyColor"
          elif [[ "$XML_UPPER" == *"GEAR"* || "$XML_UPPER" == *"SMS"* ]]; then
            TARGET_SYSTEM="Sega Game Gear"
            SKIN_PATH="borders/Sega-GameGear/GameGear-Bezel.cfg"
            API_DIR="borders/Sega-GameGear"
          elif [[ "$XML_UPPER" == *"SNES"* || "$XML_UPPER" == *"SNES9X"* || "$XML_UPPER" == *"POCKETNES"* ]]; then
            TARGET_SYSTEM="Super Nintendo"
            SKIN_PATH="borders/Nintendo-SuperNintendo-USA/SuperNintendo-USA-Bezel.cfg"
            API_DIR="borders/Nintendo-SuperNintendo-USA"
          elif [[ "$XML_UPPER" == *"NES"* || "$XML_UPPER" == *"NESTOPIA"* || "$XML_UPPER" == *"FCEUMM"* ]]; then
            TARGET_SYSTEM="NES"
            SKIN_PATH="borders/Nintendo-NES-USA/NES-USA-Bezel.cfg"
            API_DIR="borders/Nintendo-NES-USA"
          elif [[ "$XML_UPPER" == *"GENESIS"* || "$XML_UPPER" == *"MD"* || "$XML_UPPER" == *"PICODRIVE"* || "$XML_UPPER" == *"GENPLUS"* ]]; then
            TARGET_SYSTEM="Sega Genesis"
            SKIN_PATH="borders/Sega-MegaDrive-Japan/MegaDrive-Japan-Bezel.cfg"
            API_DIR="borders/Sega-MegaDrive-Japan"
          elif [[ "$XML_UPPER" == *"PCSX"* || "$XML_UPPER" == *"PSX"* || "$XML_UPPER" == *"BEETLE"* ]]; then
            TARGET_SYSTEM="PlayStation"
            SKIN_PATH="borders/Sony-PlayStation/PlayStation-Bezel.cfg"
            API_DIR="borders/Sony-PlayStation"
          fi

          echo "Target system evaluated: $TARGET_SYSTEM -> Syncing directory: $API_DIR"

          TARGET_BASE="app/src/main/assets/overlays/global_pack/$API_DIR"
          mkdir -p "$TARGET_BASE"

          # Use GitHub Contents API to query files inside the directory
          FILE_LIST=$(curl -s "https://github.com")
          
          # Force extract download keys natively
          echo "$FILE_LIST" | grep -oP '(?<="download_url": ")[^"]*' | while read -r url; do
            filename=$(basename "$url")
            curl -sL "$url" -o "$TARGET_BASE/$filename"
          done

          # Verify at least one file was dropped before proceeding
          if [ -z "$(ls -A "$TARGET_BASE")" ]; then
            echo "API directory pull failed or rate-limited. Pulling fallback controller profile configuration."
            FALLBACK_BASE="app/src/main/assets/overlays/global_pack/gamepads/flat"
            mkdir -p "$FALLBACK_BASE"
            curl -sL "https://githubusercontent.com" -o "$FALLBACK_BASE/classic_retro.cfg"
            curl -sL "https://githubusercontent.com" -o "$FALLBACK_BASE/classic_retro.png"
            SKIN_PATH="gamepads/flat/classic_retro.cfg"
          fi

          # Strip resources terminator and drop properties array safely into config
          sed -i 's|</resources>||g' app/src/main/res/values/config.xml
          
          echo "    <string name=\"input_overlay_enable\">true</string>" >> app/src/main/res/values/config.xml
          echo "    <string name=\"input_overlay_opacity\">1.000000</string>" >> app/src/main/res/values/config.xml
          echo "    <string name=\"input_overlay\">/assets/overlays/global_pack/$SKIN_PATH</string>" >> app/src/main/res/values/config.xml
          
          echo "</resources>" >> app/src/main/res/values/config.xml
      # =========================================================================

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Verify APK exists
        run: |
          if [ ! -f "app/build/outputs/apk/release/app-universal-release.apk" ]; then
            echo "APK not found!"
            exit 1
          fi

      - name: Prepare release information
        id: release
        shell: bash
        run: |
          ORIGINAL_NAME="${{ steps.config.outputs.name }}"

          # Sanitize for Android/Windows filename compatibility:
          # - Replace invalid Windows filename characters: < > : " / \ | ? *
          # - Replace control characters
          # - Trim trailing periods/spaces
          # - Replace remaining unsupported characters with -
          # - Avoid reserved Windows names
          FILE_NAME=$(echo "$ORIGINAL_NAME" \

            | sed 's/[<>:"\/\\|?*]/-/g' \
            | sed 's/[^[:print:]]/-/g' \
            | sed 's/[[:space:]]\+$//' \
            | sed 's/\.+$//' \
            | sed 's/[^A-Za-z0-9._ -]/-/g')

          if [ -z "$FILE_NAME" ]; then
            FILE_NAME="Ludere"
          fi

          case "$(echo "$FILE_NAME" | tr '[:lower:]' '[:upper:]')" in
            CON|PRN|AUX|NUL|COM[1-9]|LPT[1-9])
              FILE_NAME="Ludere-$FILE_NAME"
              ;;
          esac

          TAG_NAME=$(echo "$FILE_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/ /-/g' \
            | sed 's/[^a-z0-9._-]/-/g')

          DATE=$(date +'%Y-%m-%dT%H-%M-%S')

          echo "file_name=$FILE_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG_NAME}-${DATE}" >> "$GITHUB_OUTPUT"
          echo "name=$ORIGINAL_NAME $DATE" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          cp "app/build/outputs/apk/release/app-universal-release.apk" \
             "app/build/outputs/apk/release/${{ steps.release.outputs.file_name }}.apk"

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          files: |
            app/build/outputs/apk/release/${{ steps.release.outputs.file_name }}.apk
