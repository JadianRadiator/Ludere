name: Build Ludere APK

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Read config_name
        id: config
        shell: bash
        run: |
          CONFIG_NAME=$(grep -oP '(?<=<string name="config_name">).*(?=</string>)' app/src/main/res/values/config.xml)
          echo "name=$CONFIG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%dT%H-%M-%S')" >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.config.outputs.name }}-${{ steps.date.outputs.date }}
          release_name: ${{ steps.config.outputs.name }} ${{ steps.date.outputs.date }}

      - name: Upload APK Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/release/app-universal-release.apk
          asset_name: ${{ steps.config.outputs.name }}.apk
          asset_content_type: application/vnd.android.package-archive
