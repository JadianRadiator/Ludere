name: Build Ludere APK

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Read config_name
        id: config
        shell: bash
        run: |
          CONFIG_NAME=$(grep -oP '(?<=<string name="config_name">).*(?=</string>)' app/src/main/res/values/config.xml)

          if [ -z "$CONFIG_NAME" ]; then
            echo "Failed to find config_name in config.xml"
            exit 1
          fi

          echo "name=$CONFIG_NAME" >> "$GITHUB_OUTPUT"

      # =========================================================================
      # CRASH-PROOF API TARGETED SKIN FETCHER AND INJECTOR
      # =========================================================================
      # =========================================================================
      # AUTOMATIC LIBRETRO COMMON-OVERLAYS FETCHER
      # =========================================================================
      - name: Fetch Matching Libretro Overlay
        shell: bash
        run: |
          set -e

          CONFIG="app/src/main/res/values/config.xml"

          CORE=$(grep -oP '(?<=<string name="config_core">).*(?=</string>)' "$CONFIG" || true)
          SYSTEM=$(grep -oP '(?<=<string name="config_system">).*(?=</string>)' "$CONFIG" || true)

          SEARCH="$CORE $SYSTEM"
          SEARCH_UPPER=$(echo "$SEARCH" | tr '[:lower:]' '[:upper:]')

          echo "Configured core/system: $SEARCH"

          rm -rf common-overlays

          git clone \
            --depth=1 \
            https://github.com/libretro/common-overlays.git \
            common-overlays

          OVERLAY_ROOT="common-overlays/borders"

          MATCH=""

          while IFS= read -r DIR; do
            NAME=$(basename "$DIR")
            NAME_UPPER=$(echo "$NAME" | tr '[:lower:]' '[:upper:]')

            if [[ "$SEARCH_UPPER" == *"$NAME_UPPER"* ]]; then
              MATCH="$DIR"
              break
            fi

          done < <(find "$OVERLAY_ROOT" -mindepth 1 -maxdepth 1 -type d)

          if [ -z "$MATCH" ]; then
            echo "No matching system border found."

            MATCH="common-overlays/gamepads/flat"
            SKIN_PATH="gamepads/flat/classic_retro.cfg"

          else

            RELATIVE="${MATCH#common-overlays/}"

            CFG=$(find "$MATCH" -maxdepth 1 -name "*.cfg" | head -n1)

            if [ -z "$CFG" ]; then
              echo "Matched folder has no cfg."
              exit 1
            fi

            SKIN_PATH="$RELATIVE/$(basename "$CFG")"

          fi

          echo "Using overlay:"
          echo "$SKIN_PATH"

          TARGET="app/src/main/assets/overlays/global_pack"

          mkdir -p "$TARGET"

          cp -r "$MATCH" "$TARGET/$(dirname "$SKIN_PATH" | sed 's|.*/||')"/ || true


          sed -i '/<string name="input_overlay_enable">/d' "$CONFIG"
          sed -i '/<string name="input_overlay_opacity">/d' "$CONFIG"
          sed -i '/<string name="input_overlay">/d' "$CONFIG"

          sed -i 's|</resources>||g' "$CONFIG"

          echo '    <string name="input_overlay_enable">true</string>' >> "$CONFIG"
          echo '    <string name="input_overlay_opacity">1.000000</string>' >> "$CONFIG"
          echo "    <string name=\"input_overlay\">/assets/overlays/global_pack/$SKIN_PATH</string>" >> "$CONFIG"

          echo "</resources>" >> "$CONFIG"

          rm -rf common-overlays
      # =========================================================================

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Verify APK exists
        run: |
          if [ ! -f "app/build/outputs/apk/release/app-universal-release.apk" ]; then
            echo "APK not found!"
            exit 1
          fi

      - name: Prepare release information
        id: release
        shell: bash
        run: |
          ORIGINAL_NAME="${{ steps.config.outputs.name }}"

          # Sanitize for Android/Windows filename compatibility:
          # - Replace invalid Windows filename characters: < > : " / \ | ? *
          # - Replace control characters
          # - Trim trailing periods/spaces
          # - Replace remaining unsupported characters with -
          # - Avoid reserved Windows names
          FILE_NAME=$(echo "$ORIGINAL_NAME" \

            | sed 's/[<>:"\/\\|?*]/-/g' \
            | sed 's/[^[:print:]]/-/g' \
            | sed 's/[[:space:]]\+$//' \
            | sed 's/\.+$//' \
            | sed 's/[^A-Za-z0-9._ -]/-/g')

          if [ -z "$FILE_NAME" ]; then
            FILE_NAME="Ludere"
          fi

          case "$(echo "$FILE_NAME" | tr '[:lower:]' '[:upper:]')" in
            CON|PRN|AUX|NUL|COM[1-9]|LPT[1-9])
              FILE_NAME="Ludere-$FILE_NAME"
              ;;
          esac

          TAG_NAME=$(echo "$FILE_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/ /-/g' \
            | sed 's/[^a-z0-9._-]/-/g')

          DATE=$(date +'%Y-%m-%dT%H-%M-%S')

          echo "file_name=$FILE_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG_NAME}-${DATE}" >> "$GITHUB_OUTPUT"
          echo "name=$ORIGINAL_NAME $DATE" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          cp "app/build/outputs/apk/release/app-universal-release.apk" \
             "app/build/outputs/apk/release/${{ steps.release.outputs.file_name }}.apk"

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          files: |
            app/build/outputs/apk/release/${{ steps.release.outputs.file_name }}.apk
