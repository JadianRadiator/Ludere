name: Build Ludere APK

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Read config_name
        id: config
        shell: bash
        run: |
          CONFIG_NAME=$(grep -oP '(?<=<string name="config_name">).*(?=</string>)' app/src/main/res/values/config.xml)

          if [ -z "$CONFIG_NAME" ]; then
            echo "Failed to find config_name in config.xml"
            exit 1
          fi

          echo "name=$CONFIG_NAME" >> "$GITHUB_OUTPUT"

      # =========================================================================
      # STREAM ARCHIVE INJECTOR (Fixed URL payload delivery)
      # =========================================================================
      - name: Fetch and Inject Matching Overlay
        shell: bash
        run: |
          mkdir -p app/src/main/assets/overlays/global_pack
          
          # Force a clean payload extraction directly by pulling the master archive archive pipeline
          curl -sL "https://github.com" | tar -xzf - -C app/src/main/assets/overlays/global_pack --strip-components=1

          CORE_VAL=$(grep -oP '(?<=<string name="core_url">).*(?=</string>)' app/src/main/res/values/config.xml || echo "")
          if [ -z "$CORE_VAL" ]; then
            CORE_VAL=$(grep -oP '(?<=<string name="core">).*(?=</string>)' app/src/main/res/values/config.xml || echo "")
          fi
          
          CORE_LOWER=$(echo "$CORE_VAL" | tr '[:lower:]' '[:upper:]')
          
          SKIN_PATH="gamepads/flat/classic_retro.cfg"
          
          if [[ "$CORE_LOWER" == *"MGBA"* || "$CORE_LOWER" == *"GBA"* ]]; then
            SKIN_PATH="borders/Nintendo-GameBoyAdvance/GameBoyAdvance-Bezel.cfg"
          elif [[ "$CORE_LOWER" == *"GAMETTE"* || "$CORE_LOWER" == *"GBC"* || "$CORE_LOWER" == *"GEARBOY"* ]]; then
            SKIN_PATH="borders/Nintendo-GameBoyColor/GameBoyColor-Bezel.cfg"
          elif [[ "$CORE_LOWER" == *"GEAR"* || "$CORE_LOWER" == *"SMS"* ]]; then
            SKIN_PATH="borders/Sega-GameGear/GameGear-Bezel.cfg"
          elif [[ "$CORE_LOWER" == *"SNES"* || "$CORE_LOWER" == *"SNES9X"* ]]; then
            SKIN_PATH="borders/Nintendo-SuperNintendo-USA/SuperNintendo-USA-Bezel.cfg"
          elif [[ "$CORE_LOWER" == *"NES"* || "$CORE_LOWER" == *"NESTOPIA"* || "$CORE_LOWER" == *"FCEUMM"* ]]; then
            SKIN_PATH="borders/Nintendo-NES-USA/NES-USA-Bezel.cfg"
          elif [[ "$CORE_LOWER" == *"GENESIS"* || "$CORE_LOWER" == *"MD"* || "$CORE_LOWER" == *"PICODRIVE"* ]]; then
            SKIN_PATH="borders/Sega-MegaDrive-Japan/MegaDrive-Japan-Bezel.cfg"
          elif [[ "$CORE_LOWER" == *"PCSX"* || "$CORE_LOWER" == *"PSX"* ]]; then
            SKIN_PATH="borders/Sony-PlayStation/PlayStation-Bezel.cfg"
          fi

          echo "Target system detected: $CORE_VAL -> Using skin path: $SKIN_PATH"

          sed -i 's|</resources>||g' app/src/main/res/values/config.xml
          
          echo "    <string name=\"input_overlay_enable\">true</string>" >> app/src/main/res/values/config.xml
          echo "    <string name=\"input_overlay_opacity\">1.000000</string>" >> app/src/main/res/values/config.xml
          echo "    <string name=\"input_overlay\">/assets/overlays/global_pack/$SKIN_PATH</string>" >> app/src/main/res/values/config.xml
          
          echo "</resources>" >> app/src/main/res/values/config.xml
      # =========================================================================

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Verify APK exists
        run: |
          if [ ! -f "app/build/outputs/apk/release/app-universal-release.apk" ]; then
            echo "APK not found!"
            exit 1
          fi

      - name: Prepare release information
        id: release
        shell: bash
        run: |
          ORIGINAL_NAME="${{ steps.config.outputs.name }}"

          # Sanitize for Android/Windows filename compatibility:
          # - Replace invalid Windows filename characters: < > : " / \ | ? *
          # - Replace control characters
          # - Trim trailing periods/spaces
          # - Replace remaining unsupported characters with -
          # - Avoid reserved Windows names
          FILE_NAME=$(echo "$ORIGINAL_NAME" \

            | sed 's/[<>:"\/\\|?*]/-/g' \
            | sed 's/[^[:print:]]/-/g' \
            | sed 's/[[:space:]]\+$//' \
            | sed 's/\.+$//' \
            | sed 's/[^A-Za-z0-9._ -]/-/g')

          if [ -z "$FILE_NAME" ]; then
            FILE_NAME="Ludere"
          fi

          case "$(echo "$FILE_NAME" | tr '[:lower:]' '[:upper:]')" in
            CON|PRN|AUX|NUL|COM[1-9]|LPT[1-9])
              FILE_NAME="Ludere-$FILE_NAME"
              ;;
          esac

          TAG_NAME=$(echo "$FILE_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/ /-/g' \
            | sed 's/[^a-z0-9._-]/-/g')

          DATE=$(date +'%Y-%m-%dT%H-%M-%S')

          echo "file_name=$FILE_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG_NAME}-${DATE}" >> "$GITHUB_OUTPUT"
          echo "name=$ORIGINAL_NAME $DATE" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          cp "app/build/outputs/apk/release/app-universal-release.apk" \
             "app/build/outputs/apk/release/${{ steps.release.outputs.file_name }}.apk"

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          files: |
            app/build/outputs/apk/release/${{ steps.release.outputs.file_name }}.apk
